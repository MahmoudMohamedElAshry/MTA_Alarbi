<div class="container details-page py-5" dir="rtl">

    <div class="row g-5">

        <!-- Images Section -->
        <div class="col-lg-6">
            <div id="motorCarousel" class="carousel slide motor-carousel" data-bs-ride="carousel">

                <div class="carousel-inner rounded-4 overflow-hidden shadow-sm">

                    <div class="carousel-item" *ngFor="let img of motors?.ImgUrls; let i = index"
                        [class.active]="i === 0">

                        <img [src]="img" class="w-100 motor-img" alt="motor image">

                    </div>

                </div>

                <!-- Controls -->
                <button class="carousel-control-prev" type="button" data-bs-target="#motorCarousel"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#motorCarousel"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>

            </div>
        </div>

        <!-- Info Section -->
        <div class="col-lg-6">

            <div class="motor-info-card p-4 shadow-sm rounded-4">

                <h1 class="fw-bold mb-3">{{ motors?.Name }}</h1>

                <h2 class="price mb-4">
                    {{ motors?.Price | currency:'EGP' }}
                </h2>

                <div class="specs">

                    <div class="spec-item">
                        <span>الموديل</span>
                        <strong>{{ motors?.Model }}</strong>
                    </div>

                    <div class="spec-item">
                        <span>الماركة</span>
                        <strong>{{ getBrandName(motors?.BrandId!) }}</strong>
                    </div>

                    <div class="spec-item">
                        <span>الفئة</span>
                        <strong>{{ getCategoryName(motors?.CategoryId!) }}</strong>
                    </div>

                </div>

                <div class="description mt-4">
                    <h5>الوصف</h5>
                    <p>{{ motors?.Description }}</p>
                </div>

                <div class="actions mt-4 d-flex gap-3">

                    <button [routerLink]="['/ApplyForMotorcycle', motors?.Id]" class="btn btn-main w-100">
                        قدم الآن
                    </button>

                    <button routerLink="/showroom" class="btn btn-outline-dark w-100">
                        العودة إلى المعرض
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
