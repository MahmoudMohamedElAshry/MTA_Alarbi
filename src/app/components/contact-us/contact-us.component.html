<section class="contact-section py-5" dir="rtl">
    <div class="container">

        <div class="row mb-5 text-center">
            <div class="col-12">
                <h2 class="fw-bold main-title text-navy">تواصل معنا</h2>
                <p class="text-muted fs-5">
                    فريقنا جاهز للرد على استفساراتك وأسئلتك. يمكنك التواصل معنا عبر النموذج أدناه أو من خلال معلومات
                    الاتصال المباشرة.
                </p>
            </div>
        </div>

        <div class="row g-4">
            <!-- Contact Info -->
            <div class="col-md-5">
                <div class="contact-info p-4 shadow-sm rounded bg-light">
                    <h4 class="fw-bold mb-4 text-navy">معلومات الاتصال</h4>

                    <p><i class="fas fa-map-marker-alt me-2 text-primary"></i> القاهرة، مصر</p>
                    <p><i class="fas fa-phone-alt me-2 text-success"></i> +20 123 456 789</p>
                    <p><i class="fas fa-envelope me-2 text-warning"></i> info&#64;mta-arabi.com</p>

                    <div class="social-icons mt-4 d-flex gap-3">
                        <a href="#" class="social-icon" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                        <a href="#" class="social-icon" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
                        <a href="#" class="social-icon" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                    </div>

                </div>
            </div>

            <!-- Contact Form -->
            <div class="col-md-7">
                <div class="contact-form p-4 shadow-sm rounded bg-light">
                    <h4 class="fw-bold mb-4 text-navy">ارسل لنا رسالة</h4>
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label">الاسم الكامل</label>
                            <input type="text" class="form-control" id="name" placeholder="ادخل اسمك الكامل">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="email" placeholder="ادخل بريدك الإلكتروني">
                        </div>

                        <div class="mb-3">
                            <label for="subject" class="form-label">الموضوع</label>
                            <input type="text" class="form-control" id="subject" placeholder="موضوع الرسالة">
                        </div>

                        <div class="mb-3">
                            <label for="message" class="form-label">الرسالة</label>
                            <textarea class="form-control" id="message" rows="5"
                                placeholder="اكتب رسالتك هنا"></textarea>
                        </div>

                        <button type="submit" class="btn btn-orange btn-lg text-white w-100">ارسال الرسالة</button>
                    </form>
