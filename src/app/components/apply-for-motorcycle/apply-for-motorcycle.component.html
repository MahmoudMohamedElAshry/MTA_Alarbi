<div class="page" dir="rtl">

    <div class="card">

        <h2>طلب التقديم على الموتوسيكل</h2>
        <p>املأ البيانات وسيتم التواصل معك خلال 3 أيام عمل</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <!-- NAME -->
            <label>الاسم</label>
            <input formControlName="name" type="text" placeholder="الاسم بالكامل">

            <!-- AGE -->
            <label>السن</label>
            <input formControlName="age" type="number" placeholder="21 سنة أو أكثر">

            <!-- PHONE -->
            <label>الموبايل</label>
            <input formControlName="phone" type="text" placeholder="01xxxxxxxxx">

            <!-- ADDRESS -->
            <label>العنوان</label>
            <input formControlName="address" type="text" placeholder="محل الإقامة">

            <!-- PERSONAL IMAGE -->
            <label>الصورة الشخصية</label>
            <input type="file" (change)="onFileChange($event,'personalImage')">
            <img *ngIf="previews.personalImage" [src]="previews.personalImage">

            <!-- ID FRONT -->
            <label>البطاقة (وش)</label>
            <input type="file" (change)="onFileChange($event,'idFront')">
            <img *ngIf="previews.idFront" [src]="previews.idFront">

            <!-- ID BACK -->
            <label>البطاقة (ظهر)</label>
            <input type="file" (change)="onFileChange($event,'idBack')">
            <img *ngIf="previews.idBack" [src]="previews.idBack">

            <!-- GUARANTOR FRONT -->
            <label>بطاقة الضامن (وش)</label>
            <input type="file" (change)="onFileChange($event,'guarantorFront')">
            <img *ngIf="previews.guarantorFront" [src]="previews.guarantorFront">

            <!-- GUARANTOR BACK -->
            <label>بطاقة الضامن (ظهر)</label>
            <input type="file" (change)="onFileChange($event,'guarantorBack')">
            <img *ngIf="previews.guarantorBack" [src]="previews.guarantorBack">

            <!-- BUTTON -->
            <button class="btn-orange" type="submit" [disabled]="isLoading">
                {{ isLoading ? 'جاري الإرسال...' : 'إرسال الطلب' }}
            </button>

        </form>

    </div>

</div>
<!-- 🔥 Success Modal -->
<div class="modal-overlay" *ngIf="showMessage">

    <div class="modal-box">

        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>

        <h3>تم إرسال الطلب بنجاح</h3>

        <p>تم استلام بياناتك، وسيتم التواصل معك خلال 3 أيام عمل</p>

        <button class="btn-ok" (click)="closeMessage()">
            حسناً
        </button>

    </div>

</div>
